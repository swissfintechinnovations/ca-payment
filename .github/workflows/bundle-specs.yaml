name: 'Bundle API specification'

on:
  workflow_dispatch:
    inputs:
      filenames:
        type: string
        default: 'src/*.yaml'
        description: 'API specifications to be bundled (list of files sperated by a whitespace, must be recognized by ls). Default: src/*.yaml'

jobs:
  bundle-specs:
    uses: swissfintechinnovations/.github/.github/workflows/reusable-bundle-workflow.yaml@main
    with:
      filenames: ${{ github.event.inputs.filenames || 'src/*.yaml' }}
