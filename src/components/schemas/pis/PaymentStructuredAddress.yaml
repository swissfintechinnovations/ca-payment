title: Structured Address for Payments
type: object
description: Specifies the details of a structured address.
required:
  - streetName
  - postCode
  - townName
  - country
properties:
  streetName:
    type: string
    maxLength: 70
    description: The street name. Corresponds to the attribute _StrtNm_ in SPS/ISO-20022.
    example: Rue de la gare
  buildingNumber:
    type: string
    maxLength: 16
    description: >-
      The building number. Corresponds to the attribute _BldgNb_ in
      SPS/ISO-20022.
    example: '24'
  postCode:
    type: string
    maxLength: 16
    description: The post code. Corresponds to the attribute _PstCd_ in SPS/ISO-20022.
    example: '2501'
  townName:
    type: string
    maxLength: 35
    description: The town name. Corresponds to the attribute _TwnNm_ in SPS/ISO-20022.
    example: Biel
  country:
    type: string
    maxLength: 2
    description: >-
      The counterparty country. Corresponds to the attribute _Ctry_ in
      SPS/ISO-20022.
    example: CH
