title: Balance Currency-Amount
description: >-
  Specifies the requested account balance. Corresponds to the attribute _Bal_ in
  SPS/ISO-20022.
type: object
required:
  - currency
  - amount
properties:
  currency:
    $ref: ./Currency.yaml
    description: >-
      The ISO currency three-letter code in which the balance and the account
      are held.
  amount:
    $ref: ./Amount.yaml
    description: The amount of the requested account balance.
