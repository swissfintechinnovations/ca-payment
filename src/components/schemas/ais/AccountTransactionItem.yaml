title: Account Transaction Item
type: object
description: Specifies the transaction entry item.
required:
  - transactionId
  - transactionType
  - amount
properties:
  transactionId:
    type: string
    maxLength: 35
    description: >
      The unique identifier to the listed transaction. Defined by the bank.
      Corresponds to the attribute _TxDtls ⇾ Refs ⇾ PmtInfId_ in SPS/ISO-20022.
    example: TX12345A987
  transactionType:
    $ref: ./AccountTransactionTransactionType.yaml
  endToEndId:
    type: string
    maxLength: 35
    description: >-
      The unique reference of the debtor/creditor. Corresponds to the attribute
      _EndToEndId_ in SPS/ISO-20022.
    example: ENDTOENDID-01
  bankTransactionCode:
    $ref: ./AccountTransactionBankTransactionCode.yaml
  amount:
    $ref: ./PaymentCurrencyAmount.yaml
  instructedAmount:
    $ref: ./AccountTransactionInstructedAmount.yaml
  totalChargesAmount:
    $ref: ./AccountTransactionItemCharges.yaml
  counterparty:
    $ref: ./AccountTransactionCounterparty.yaml
  remittanceInformation:
    $ref: ./PaymentRemittanceInformation.yaml
  remittanceReference:
    $ref: ./AccountTransactionRemittanceReference.yaml
  additionalTransactionInformation:
    type: string
    maxLength: 140
    description: >-
      Any additional information to the transaction. Corresponds to the
      attribute _AddtlTxInf_ in SPS/ISO-20022.
    example: Online Shopping Visa Debit Card Nr. xxxx 1234
