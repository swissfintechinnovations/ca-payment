title: Account Information Item
type: object
description: The account object.
required:
  - accountOwner
  - id
  - account
  - currency
properties:
  id:
    $ref: ./CommonAccountId.yaml
  account:
    $ref: ./PaymentIbanAccount.yaml
  accountOwner:
    type: string
    maxLength: 140
    description: The owner of the account.
    example: Account Owner XYZ
  currency:
    $ref: ./Currency.yaml
    description: >-
      The ISO currency three-letter code denominated and set for the account at
      the time it is opened.
  allowedCurrencies:
    type: array
    items:
      type: string
      example: CHF
    description: Permitted currencies for the account.
  designation:
    type: string
    maxLength: 140
    description: >
      This element shall always be populated with the account alias, if defined,
      otherwise with specific bank account name

      (e.g. bank saving account).

      **NOTE:** This property will become mandatory with the next major release
      v5 of this API.
    example: Firmenkonto
  accountTypeCode:
    type: string
    description: >
      Contains the account type code according to the ISO20022 external cash
      account type code list. It is strongly recommended

      to use only the 5 codes below as follows:

      * LOAN: Account used for loans (loan and mortgage accounts) - DE:
      Darlehenskonto, Kreditkonto, Baukreditkonto, Hypothekarkonto

      * LLSV: Account used for savings with special interest and withdrawal
      terms (pension provision and vested benefits accounts) -

      DE: Vorsorge- und Freizügigkeitskonten

      * SVGS: Account used for savings (all types of saving accounts)

      * TRAN: Account used for transactions (all types of personal, current and
      payment accounts) - DE: Privat-, Kontokorent- und

      Zahlungsverkehrskonten

      * OTHR: Account not otherwise specified (gathering pool for all other
      accounts)

      **NOTE:** This property will become mandatory with the next major release
      v5 of this API.
    example: TRAN
    enum:
      - CACC
      - CARD
      - CASH
      - CHAR
      - CISH
      - COMM
      - CPAC
      - LLSV
      - LOAN
      - MGLD
      - MOMA
      - NFCA
      - NREX
      - ODFT
      - ONDP
      - OTHR
      - SACC
      - SLRY
      - SVGS
      - TAXE
      - TRAN
      - TRAS
      - VACC
  _links:
    type: object
    description: >-
      Contains the paths to additional resources for specific account (e.g. path
      to balance and transactions resource).
    properties:
      self:
        type: string
        example: /accounts/550e8400-e29b-11d4-a716-446655440000
      balance:
        type: string
        example: /accounts/550e8400-e29b-11d4-a716-446655440000/balance
      transactions:
        type: string
        example: /accounts/550e8400-e29b-11d4-a716-446655440000/transactions
