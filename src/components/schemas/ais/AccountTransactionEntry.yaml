title: Account Transaction Entry
type: object
description: The account transaction entry object.
required:
  - entryId
  - transactionType
  - bookingDate
  - valueDate
  - amount
  - bankTransactionCode
  - additionalEntryInformation
properties:
  entryId:
    type: string
    description: >-
      Unique bank-defined ID for the transaction. Corresponds to the attribute
      _Ntry ⇾ AddtlInfInd ⇾ MsgId_ in SPS/ISO-20022.
    example: ENTRY123456789
  transactionType:
    $ref: ./AccountTransactionTransactionType.yaml
  entryReference:
    type: string
    description: >
      Mandatory for business cases ISR and QR-IBAN. Contains the ISR participant
      number or QR-IBAN of the account owner. Corresponds to the attribute
      _NtryRef_ in SPS/ISO-20022.
    example: '10001628'
    maxLength: 35
  entryReferenceInternalId:
    type: string
    description: >
      Additional grouping criteria for business cases ISR and QR-IBAN. Contains
      the BISR-ID or first 6 characters of the QR reference.
    example: '123456'
    maxLength: 35
  reversalIndicator:
    type: boolean
    description: >
      Indicates if the transaction is a reversing entry. Must always be true.
      Corresponds to the attribute _RvslInd_ in SPS/ISO-20022.
    example: true
  bookingDate:
    $ref: ./Date.yaml
    description: >-
      The booking date of the transaction set by the bank. Corresponds to the
      attribute _BookgDt_ in SPS/ISO-20022.
  valueDate:
    $ref: ./Date.yaml
    description: >-
      The value date of the transaction set by the bank. Corresponds to the
      attribute _ValDt_ in SPS/ISO-20022.
  amount:
    $ref: ./PaymentCurrencyAmount.yaml
  instructedAmount:
    $ref: ./AccountTransactionInstructedAmount.yaml
  totalChargesAmount:
    $ref: ./AccountTransactionItemCharges.yaml
  bankTransactionCode:
    $ref: ./AccountTransactionBankTransactionCode.yaml
  additionalEntryInformation:
    type: string
    description: >-
      Additional entry information. Corresponds to the attribute _AddtlNtryInf_
      in SPS/ISO-20022.
    example: Online Shopping Visa Debit Card Nr. xxxx 1234
  transactions:
    type: array
    description: Specifies the transaction entries.
    items:
      $ref: ./AccountTransactionItem.yaml
